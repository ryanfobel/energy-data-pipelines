[project]
name = "energy-data-pipelines"
version = "1.0.0"
description = "Privacy-first energy data pipelines for homeowners and cooperatives"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.11,<3.13"
pandas = "*"
duckdb = "*"
pyarrow = ">=25.0.0,<26"
pyyaml = "*"

[pypi-dependencies]
dlt = { version = "*", extras = ["duckdb"] }
dbt-duckdb = "*"

[tasks]
# Setup
setup = "echo 'Copy config.example.yml to config.local.yml and edit with your settings'"
setup-env = "cp .env.example .env && echo 'Edit .env with your API tokens'"

# Pipelines
pipeline-green-button = "python scripts/test_green_button_pipeline.py"
pipeline-home-assistant = "python scripts/test_ha_dbt_only.py"
pipeline-all = "python scripts/test_combined_pipeline.py"

# Transform
dbt-run = { cmd = "dbt run --profiles-dir . --project-dir .", cwd = "transform" }
dbt-test = { cmd = "dbt test --profiles-dir . --project-dir .", cwd = "transform" }
dbt-docs = { cmd = "dbt docs generate --profiles-dir . --project-dir . && dbt docs serve", cwd = "transform" }

# Export
export-paimon = "python scripts/export_to_paimon.py"
export-all = "python scripts/test_ha_export.py"

# Test
test-green-button = "python scripts/test_green_button_pipeline.py"
test-home-assistant = "python scripts/test_ha_dbt_only.py"
test-export = "python scripts/test_ha_export.py"
test-all = "python scripts/test_combined_pipeline.py"

# Utilities
clean = "python -c 'import shutil; [shutil.rmtree(p, ignore_errors=True) for p in [\"data\", \"logs\", \"transform/target\"]]; import pathlib; [p.unlink() for p in pathlib.Path(\".\").glob(\"*.duckdb\")]'"
generate-mock-data = "python scripts/generate_mock_ha_data.py"
inspect-db = "python -c 'import duckdb; conn = duckdb.connect(\"energy_warehouse.duckdb\"); conn.execute(\"SHOW TABLES\").show()'"
